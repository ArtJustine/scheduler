name: Scheduled Post Trigger

on:
  schedule:
    # GitHub Actions minimum is every 5 minutes
    - cron: "*/5 * * * *"
  # Allow manual trigger from the GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  trigger-scheduler:
    name: Trigger Post Scheduler
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping scheduler endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "https://chiyusocial.com/api/cron/scheduler" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "Scheduler responded with HTTP $response"
          if [ "$response" != "200" ]; then
            echo "::warning::Scheduler returned non-200 status: $response"
          fi
